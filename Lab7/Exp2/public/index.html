<!DOCTYPE html>
<html>
<head>
<title>Online Book Finder</title>
<style>
body{font-family:Arial;background:#f4f4f4;padding:20px}
.book{background:white;margin:10px;padding:10px;border-radius:5px}
</style>
</head>

<body>

<h2>Online Book Finder</h2>

<input id="title" placeholder="Search Book Title">
<button onclick="searchBook()">Search</button>

<select id="category" onchange="filterCategory()">
<option value="">Select Category</option>
<option value="Programming">Programming</option>
<option value="AI">AI</option>
<option value="Data Science">Data Science</option>
</select>

<button onclick="sortPrice()">Sort by Price</button>
<button onclick="sortRating()">Sort by Rating</button>
<button onclick="topBooks()">Top Rated</button>

<h3>Books</h3>
<div id="books"></div>

<button onclick="loadPage(1)">1</button>
<button onclick="loadPage(2)">2</button>
<button onclick="loadPage(3)">3</button>

<script src="script.js"></script>

</body>
</html>
